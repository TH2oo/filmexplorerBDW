{% extends "base.html" %}
{% load static %}

{% block title %}Bienvenue - Film Explorer{% endblock %}

{% block extra_head %}
    <style>
        .welcome-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
            text-align: center;
        }

        .welcome-card {
            background: white;
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            border: 1px solid #eee;
        }

        .welcome-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 10px;
        }

        .welcome-card h1 {
            color: #2c3e50;
            margin: 10px 0 5px 0;
            font-size: 1.8rem;
        }

        .welcome-card p {
            color: #7f8c8d;
            font-size: 1rem;
            margin-bottom: 30px;
        }

        .welcome-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .welcome-actions a {
            display: block;
            padding: 14px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .btn-watchlist {
            background-color: #3498db;
            color: white;
        }

        .btn-watchlist:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }

        .btn-browse {
            background-color: #f8fafc;
            color: #2c3e50;
            border: 2px solid #edf2f7;
        }

        .btn-browse:hover {
            background-color: #edf2f7;
            transform: translateY(-2px);
        }
    </style>
{% endblock %}

{% block content %}
<div class="welcome-container">
    <div class="welcome-card">
        <span class="welcome-icon">🎬</span>
        <h1>Bienvenue, {{ user.username }} !</h1>
        <p>Que souhaitez-vous faire aujourd'hui ?</p>

        <div class="welcome-actions">
            <a href="{% url 'film_list_template' %}" class="btn-watchlist">📋 Ma Watchlist</a>
            <a href="{% url 'film_browse' %}" class="btn-browse">🔍 Parcourir les films</a>
        </div>
    </div>
</div>
{% endblock %}
